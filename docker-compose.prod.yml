# king-shop 单机生产部署
# MySQL + Redis + Nginx + PHP-FPM 全部在同一台服务器
# MySQL/Redis 仅容器内网，不暴露公网
# 完整说明见 docs/deploy-single-server.md

services:
  mysql:
    image: mysql:8.0.40
    container_name: king-shop-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-changeme_root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-king_shop}
      MYSQL_USER: ${MYSQL_USER:-king_shop}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-changeme}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --explicit_defaults_for_timestamp=true
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - king-shop
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-changeme_root}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7.4-alpine
    container_name: king-shop-redis
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - king-shop
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 自有 PHP 基础镜像（构建用，不常驻运行）──
  php-base-fpm:
    image: king-shop/php:8.4.3-fpm
    build:
      context: ./docker/php
      dockerfile: Dockerfile.fpm
      args:
        PHP_VERSION: "8.4.3"
        COMPOSER_VERSION: "2.8.5"
    profiles: ["base"]

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    image: king-shop-backend:prod
    container_name: king-shop-backend
    restart: always
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: ${APP_KEY:-}
      APP_URL: ${APP_URL:-http://localhost}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_DATABASE: ${MYSQL_DATABASE:-king_shop}
      DB_USERNAME: ${MYSQL_USER:-king_shop}
      DB_PASSWORD: ${MYSQL_PASSWORD:-changeme}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      LOG_CHANNEL: stderr
    volumes:
      - backend_storage:/var/www/html/storage
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - king-shop

  nginx:
    image: nginx:1.27.4-alpine
    container_name: king-shop-nginx
    restart: always
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./docker/nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/var/www/frontend:ro
    depends_on:
      - backend
    networks:
      - king-shop

networks:
  king-shop:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  backend_storage:
